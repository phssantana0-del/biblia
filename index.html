<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bíblia Sagrada</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=David+Libre:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ════════════════════ LAYOUT RAIZ (conteúdo + drawer PDF) ════════════════════ -->
<div id="page-layout">
<div id="content-wrapper">

<!-- ════════════════════════════════════════════════════ TOP BAR -->
<div id="topbar">
  <button class="link-btn" onclick="openBooks()">📖 Todos os Livros</button>
  <span id="topbar-edition-label">Bíblia Sagrada</span>
  <div id="edition-selector">
    <label for="sel-edition">Edição:</label>
    <select id="sel-edition" onchange="onEditionChange(this.value)">
      <!-- preenchido dinamicamente -->
    </select>
    <button id="theme-toggle-btn" class="theme-toggle-btn" onclick="toggleDarkMode()" aria-pressed="false" title="Ativar modo noturno">🌙 Noturno</button>
  </div>
</div>

<!-- ════════════════════════════════════════ COMPARE BAR -->
<div id="compare-bar">
  <select id="sel-compare-edition" onchange="onCompareEditionChange(this.value)">
    <!-- preenchido quando compare ativo -->
  </select>
</div>

<!-- ════════════════════════════════════════ NAV: livro + capítulo -->
<div id="nav">
  <div class="nav-row">
    <a href="#" onclick="prevBook(); return false;">&lt; livro ant.</a>
    <span class="book-title" id="nav-book-title"></span>
    <a href="#" onclick="nextBook(); return false;">próx. livro &gt;</a>
  </div>
  <div class="nav-row" id="nav-chapter-row">
    <span class="dimmed" id="nav-prev-ch">&lt; cap. ant.</span>
    <span class="book-title">Capítulo <span id="nav-ch-num">1</span></span>
    <span class="dimmed" id="nav-next-ch">próx. cap. &gt;</span>
  </div>
  <div class="chapter-links" id="chapter-links">
    <span class="label">Capítulos:</span>
  </div>
  <div id="chapter-actions">
    <button id="compare-toggle-btn" class="compare-toggle-btn" onclick="toggleCompare()">Comparar com Vulgata</button>
    <span id="compare-status" class="compare-status"></span>
  </div>
</div>

<!-- ════════════════════════════════════════ CONTEÚDO PRINCIPAL -->
<div id="main-area" class="single">
  <div id="col-primary">
    <div id="content"><p class="loading-msg">Carregando…</p></div>
  </div>
  <div id="col-compare">
    <div id="col-compare-header"></div>
    <div id="content-compare"><p class="loading-msg">Carregando edição para comparação…</p></div>
  </div>
  <div id="compare-grid"></div>
</div>

<!-- ════════════════════════════════════════ BOTTOM NAV -->
<div id="bottomnav">
  <div class="nav-row">
    <span class="dimmed" id="bot-prev">&lt; cap. ant.</span>
    <span class="book-title" id="bot-book-title"></span>
    <span class="dimmed" id="bot-next">próx. cap. &gt;</span>
  </div>
  <div><a href="#" style="font-size:13px;color:#00c;" onclick="window.scrollTo(0,0);return false;">↑ topo</a></div>
</div>

<!-- ════════════════════════════════════════ BOOK SELECTOR -->
<div id="book-selector" onclick="closeBooksOverlay(event)">
  <div id="book-panel">
    <h2>Selecionar Livro <button class="close-btn" onclick="closeBooks()">&#x2715;</button></h2>
    <div id="book-list-content">
      <p class="loading-msg">Carregando lista de livros…</p>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════ INTRO MODAL -->
<div id="intro-modal" onclick="closeIntroOverlay(event)">
  <div id="intro-panel">
    <button class="close-btn" onclick="closeIntro()">&#x2715;</button>
    <div id="intro-content"></div>
  </div>
</div>

</div><!-- /#content-wrapper -->

<!-- ════════════════════════════════════════════ DRAWER PDF ORIGINAL -->
<div id="pdf-panel">
  <div id="pdf-panel-header">
    <span id="pdf-panel-title">&#128196; Original</span>
    <button id="pdf-panel-close" onclick="closePdfPanel()" title="Fechar">&#x2715;</button>
  </div>
  <iframe id="pdf-frame" src="" title="PDF original"></iframe>
</div>

</div><!-- /#page-layout -->

<script src="app.js"></script>
</body>
</html>
