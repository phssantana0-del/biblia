<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bíblia Sagrada</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'EB Garamond', Georgia, 'Times New Roman', serif;
    font-size: 18px;
    line-height: 1.7;
    color: #111;
    background: #fff;
    margin: 0;
    padding: 0;
    font-variant-numeric: oldstyle-nums;
  }

  #page-layout {
    max-width: 100%;
  }

  /* ── Top bar ── */
  #topbar {
    border-bottom: 1px solid #999;
    padding: 6px 0 4px;
    font-size: 14px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    align-items: center;
  }

  #topbar a, #topbar button.link-btn {
    color: #00c;
    text-decoration: none;
    background: none;
    border: none;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    padding: 0;
  }
  #topbar a:hover, #topbar button.link-btn:hover { text-decoration: underline; }
  #topbar span { color: #555; }

  #edition-selector {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #edition-selector label { color: #555; }

  select {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 14px;
    padding: 2px 4px;
    border: 1px solid #999;
    background: #fff;
    color: #111;
    cursor: pointer;
  }

  /* ── Compare mode toggle ── */
  #compare-bar { display: none !important; }

  /* ── Nav ── */
  #nav {
    margin: 10px 0 0;
    font-size: 14px;
  }

  .nav-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  .nav-row .book-title {
    flex: 1;
    text-align: center;
    font-weight: bold;
    color: #111;
  }

  .nav-row a, .chapter-links a {
    color: #00c;
    text-decoration: none;
    white-space: nowrap;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: inherit;
    padding: 0;
  }
  .nav-row a:hover, .chapter-links a:hover { text-decoration: underline; }
  .nav-row .dimmed { color: #999; }

  .chapter-links {
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }

  .chapter-links .label { color: #555; }
  .chapter-links a.current { font-weight: bold; color: #111; text-decoration: none; cursor: default; }

  /* ── Main content area ── */
  #main-area {
    display: block;
  }

  /* In normal mode, single column fills full width */
  #main-area.single #col-primary { display: block; }
  #main-area.single #col-compare { display: none; }
  #main-area.single #compare-grid { display: none; }

  /* In compare mode, hide individual columns — grid handles layout */
  #main-area.compare #col-primary { display: none; }
  #main-area.compare #col-compare { display: none; }
  #main-area.compare #compare-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    column-gap: 32px;
  }

  #col-compare-header { display: none; }

  /* ── Compare grid ── */
  #compare-grid { display: none; }

  .cg-cell {
    padding: 6px 0 10px;
    font-size: 18px;
    line-height: 1.7;
  }

  .cg-header-cell {
    padding: 18px 0 6px;
  }

  .cg-edition-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #999;
    margin-bottom: 4px;
  }

  .cg-chapter-title {
    font-size: 19px;
    font-weight: bold;
    margin-bottom: 2px;
  }

  .cg-summary-text {
    font-size: 14px;
    color: #555;
    font-style: italic;
  }

  .cg-rule {
    grid-column: 1 / -1;
    border: none;
    border-top: 1px solid #aaa;
    height: 0;
    margin: 4px 0 8px;
  }

  .cg-divider {
    grid-column: 1 / -1;
    border-top: 1px solid #ddd;
    height: 0;
    margin: 0;
  }

  /* ── Chapter header ── */
  .chapter-header {
    margin: 18px 0 6px;
  }

  .chapter-header h1 {
    font-size: 19px;
    font-weight: bold;
    margin-bottom: 2px;
  }

  .chapter-header .summary {
    font-size: 14px;
    color: #555;
    font-style: italic;
    margin-bottom: 10px;
  }

  hr.section-rule {
    border: none;
    border-top: 1px solid #aaa;
    margin: 8px 0 12px;
  }

  /* ── Verses ── */
  .verse {
    margin-bottom: 4px;
    font-size: 19px;
  }

  .vnum {
    display: inline-block;
    min-width: 1.8em;
    text-align: right;
    font-weight: bold;
    margin-right: 6px;
    color: #111;
    font-size: 18px;
    font-variant-numeric: lining-nums tabular-nums;
    vertical-align: baseline;
  }

  .vnum a {
    color: inherit;
    text-decoration: none;
  }

  .prophetic { font-style: italic; }

  /* highlight matched verses in compare mode */
  .verse.highlighted { background: #fffff0; }

  /* separador entre versículos no modo comparação */
  #main-area.compare .verse {
    border-bottom: 1px solid #ddd;
    padding-bottom: 8px;
    margin-bottom: 8px;
  }

  /* ── Footnote reference ── */
  sup.fnref {
    font-size: 12px;
    cursor: pointer;
    color: #00c;
    margin-left: 2px;
    position: relative;
  }

  /* ── Inline footnote popup ── */
  .fn-popup {
    display: none;
    position: absolute;
    z-index: 100;
    background: #fffff0;
    border: 1px solid #888;
    padding: 10px 14px;
    font-size: 15px;
    line-height: 1.6;
    width: 420px;
    max-width: 90vw;
    box-shadow: 2px 3px 8px rgba(0,0,0,0.18);
    left: 0;
    top: 1.4em;
    color: #111;
    text-align: left;
  }

  .fn-popup.active { display: block; }
  .fn-popup .fn-label { font-weight: bold; font-style: italic; }
  .fn-popup .fn-close {
    position: absolute;
    top: 5px;
    right: 8px;
    cursor: pointer;
    font-size: 14px;
    color: #555;
    line-height: 1;
    background: none;
    border: none;
    padding: 2px 4px;
  }
  .fn-popup .fn-close:hover { color: #000; }

  /* ── Bio boxes ── */
  .bio {
    border-top: 1px solid #aaa;
    border-bottom: 1px solid #aaa;
    padding: 10px 0;
    margin: 12px 0;
    font-size: 16px;
  }

  .bio .bio-title {
    font-weight: bold;
    font-variant: small-caps;
    font-size: 17px;
    margin-bottom: 4px;
  }

  /* ── Bottom nav ── */
  #bottomnav {
    margin-top: 24px;
    font-size: 14px;
    border-top: 1px solid #aaa;
    padding-top: 8px;
  }

  #bottomnav .nav-row { margin-bottom: 4px; }

  /* ── Loading / error states ── */
  .loading-msg {
    color: #888;
    font-style: italic;
    padding: 20px 0;
    font-size: 15px;
  }

  .error-msg {
    color: #a00;
    font-size: 15px;
    padding: 10px 0;
  }

  /* ── Botão Ver original ── */
  .ver-original-btn {
    display: inline-block;
    margin-top: 6px;
    color: #00c;
    background: none;
    border: none;
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 14px;
    cursor: pointer;
    padding: 0;
    text-decoration: none;
  }
  .ver-original-btn:hover { text-decoration: underline; }

  /* ── Layout raiz para o drawer push ── */
  #page-layout {
    display: flex;
    align-items: stretch;
    width: 100%;
  }

  /* Envoltório do conteúdo principal — encolhe quando o drawer abre */
  #content-wrapper {
    flex: 1;
    min-width: 0;
    overflow: visible;
    transition: flex 0.25s ease;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }

  /* ── Drawer de PDF original ── */
  #pdf-panel {
    flex: 0 0 0;
    width: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border-left: 0px solid #888;
    background: #fff;
    transition: flex-basis 0.25s ease, border-left-width 0.25s step-start;
  }

  #pdf-panel.open {
    flex: 0 0 min(50vw, 720px);
    border-left-width: 1px;
  }

  #pdf-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border-bottom: 1px solid #ccc;
    font-size: 14px;
    flex-shrink: 0;
    white-space: nowrap;
  }

  #pdf-panel-header span { color: #555; font-style: italic; }

  #pdf-panel-close {
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
    color: #555;
    line-height: 1;
    padding: 2px 4px;
  }
  #pdf-panel-close:hover { color: #000; }

  #pdf-frame {
    flex: 1;
    border: none;
    width: 100%;
    min-width: 280px;
  }

  @media (max-width: 700px) {
    #pdf-panel.open { flex: 0 0 100vw; }
  }

  /* ── Book selector overlay ── */
  #book-selector {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    justify-content: center;
    align-items: flex-start;
    padding-top: 50px;
  }

  #book-selector.open { display: flex; }

  #book-panel {
    background: #fff;
    border: 1px solid #888;
    padding: 16px 24px 24px;
    max-width: 680px;
    width: 96vw;
    max-height: 82vh;
    overflow-y: auto;
    font-size: 15px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.18);
  }

  #book-panel h2 {
    font-size: 17px;
    font-weight: bold;
    padding-bottom: 10px;
    margin-bottom: 14px;
    border-bottom: 1px solid #ddd;
  }

  #book-panel .close-btn {
    float: right;
    cursor: pointer;
    background: none;
    border: none;
    font-size: 16px;
    color: #555;
    line-height: 1;
    margin-top: -2px;
  }

  .testament-section { margin-bottom: 4px; }
  .testament-section + .testament-section {
    border-top: 1px solid #ddd;
    padding-top: 14px;
    margin-top: 8px;
  }

  .testament-title {
    font-size: 13px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #555;
    margin-bottom: 10px;
  }

  .book-group { margin-bottom: 8px; }
  .book-group .group-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #999;
    margin-bottom: 3px;
  }

  .book-group a {
    display: inline-block;
    color: #00c;
    text-decoration: none;
    margin: 1px 10px 2px 0;
    font-size: 15px;
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    padding: 0;
  }
  .book-group a:hover { text-decoration: underline; }
  .book-group a.current-book { font-weight: bold; color: #111; cursor: default; text-decoration: none; }
  .book-group a.unavailable { color: #aaa; cursor: not-allowed; }

  @media (max-width: 600px) {
    body { font-size: 17px; }
    .fn-popup { width: 92vw; }
    #main-area.compare #compare-grid { grid-template-columns: 1fr; }
    #edition-selector { margin-left: 0; }
  }

  /* ── Intro modal ── */
  #intro-modal {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    justify-content: center;
    align-items: flex-start;
    padding-top: 50px;
  }

  #intro-modal.open { display: flex; }

  #intro-panel {
    background: #fff;
    border: 1px solid #888;
    padding: 16px 24px 24px;
    max-width: 680px;
    width: 96vw;
    max-height: 82vh;
    overflow-y: auto;
    font-size: 15px;
    line-height: 1.7;
    box-shadow: 0 4px 20px rgba(0,0,0,0.18);
    position: relative;
  }

  #intro-panel .close-btn {
    float: right;
    cursor: pointer;
    background: none;
    border: none;
    font-size: 16px;
    color: #555;
    line-height: 1;
    margin-top: -2px;
  }

  #intro-content h3 { font-size: 17px; margin-bottom: 10px; border-bottom: 1px solid #ddd; padding-bottom: 8px; }
  #intro-content p { margin-bottom: 10px; }
  #intro-content em.footnote { font-size: 13px; color: #888; display: block; margin-top: 2px; }
</style>
</head>
<body>

<!-- ════════════════════ LAYOUT RAIZ (conteúdo + drawer PDF) ════════════════════ -->
<div id="page-layout">
<div id="content-wrapper">

<!-- ════════════════════════════════════════════════════ TOP BAR -->
<div id="topbar">
  <button class="link-btn" onclick="openBooks()">📖 Todos os Livros</button>
  <span>|</span>
  <span id="topbar-edition-label">Bíblia Sagrada</span>
  <div id="edition-selector">
    <label for="sel-edition">Edição:</label>
    <select id="sel-edition" onchange="onEditionChange(this.value)">
      <!-- preenchido dinamicamente -->
    </select>
    <span>|</span>
    <button class="link-btn" id="btn-compare" onclick="toggleCompare()" title="Comparar com outra edição">⇄ Comparar</button>
  </div>
</div>

<!-- ════════════════════════════════════════ COMPARE BAR -->
<div id="compare-bar">
  <label>Comparar com:</label>
  <select id="sel-compare-edition" onchange="onCompareEditionChange(this.value)">
    <!-- preenchido quando compare ativo -->
  </select>
  <span id="compare-status" style="color:#888;font-style:italic;"></span>
</div>

<!-- ════════════════════════════════════════ NAV: livro + capítulo -->
<div id="nav">
  <div class="nav-row">
    <a href="#" onclick="prevBook(); return false;">&lt; livro ant.</a>
    <span class="book-title" id="nav-book-title"></span>
    <a href="#" onclick="nextBook(); return false;">próx. livro &gt;</a>
  </div>
  <div class="nav-row" id="nav-chapter-row">
    <span class="dimmed" id="nav-prev-ch">&lt; cap. ant.</span>
    <span class="book-title">Capítulo <span id="nav-ch-num">1</span></span>
    <span class="dimmed" id="nav-next-ch">próx. cap. &gt;</span>
  </div>
  <div class="chapter-links" id="chapter-links">
    <span class="label">Capítulos:</span>
  </div>
</div>

<!-- ════════════════════════════════════════ CONTEÚDO PRINCIPAL -->
<div id="main-area" class="single">
  <div id="col-primary">
    <div id="content"><p class="loading-msg">Carregando…</p></div>
  </div>
  <div id="col-compare">
    <div id="col-compare-header"></div>
    <div id="content-compare"><p class="loading-msg">Carregando edição para comparação…</p></div>
  </div>
  <div id="compare-grid"></div>
</div>

<!-- ════════════════════════════════════════ BOTTOM NAV -->
<div id="bottomnav">
  <div class="nav-row">
    <span class="dimmed" id="bot-prev">&lt; cap. ant.</span>
    <span class="book-title" id="bot-book-title"></span>
    <span class="dimmed" id="bot-next">próx. cap. &gt;</span>
  </div>
  <div><a href="#" style="font-size:13px;color:#00c;" onclick="window.scrollTo(0,0);return false;">↑ topo</a></div>
</div>

<!-- ════════════════════════════════════════ BOOK SELECTOR -->
<div id="book-selector" onclick="closeBooksOverlay(event)">
  <div id="book-panel">
    <h2>Selecionar Livro <button class="close-btn" onclick="closeBooks()">&#x2715;</button></h2>
    <div id="book-list-content">
      <p class="loading-msg">Carregando lista de livros…</p>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════ INTRO MODAL -->
<div id="intro-modal" onclick="closeIntroOverlay(event)">
  <div id="intro-panel">
    <button class="close-btn" onclick="closeIntro()">&#x2715;</button>
    <div id="intro-content"></div>
  </div>
</div>

</div><!-- /#content-wrapper -->

<!-- ════════════════════════════════════════════ DRAWER PDF ORIGINAL -->
<div id="pdf-panel">
  <div id="pdf-panel-header">
    <span>&#128196; Original</span>
    <button id="pdf-panel-close" onclick="closePdfPanel()" title="Fechar">&#x2715;</button>
  </div>
  <iframe id="pdf-frame" src="" title="PDF original"></iframe>
</div>

</div><!-- /#page-layout -->

<script>
// ══════════════════════════════════════════════════════════════
//  ESTADO GLOBAL
// ══════════════════════════════════════════════════════════════

const BASE_URL = 'edicoes/index.json';

let state = {
  editions: [],           // array de edições carregadas de edicoes/index.json
  currentEditionId: null, // id da edição principal
  currentBookId: null,    // id do livro atual
  currentBookDir: null,   // ex: 'edicoes/figueiredo/proverbios'
  currentChapter: 1,
  currentBookIntroducao: null, // HTML da introdução do livro atual
  loadedBookIndexes: {},  // cache de index.json por livro — chave: editionId + '/' + bookFile
  loadedChapters: {},     // cache de capítulos — chave: bookDir + '/' + num
  compareMode: false,
  compareEditionId: null,
  compareBookData: null,
};

let activePopup = null;

// ══════════════════════════════════════════════════════════════
//  BOOTSTRAP
// ══════════════════════════════════════════════════════════════

async function init() {
  try {
    const res = await fetch(BASE_URL);
    if (!res.ok) throw new Error(`Não foi possível carregar edicoes/index.json (HTTP ${res.status})`);
    state.editions = await res.json();
  } catch (e) {
    document.getElementById('content').innerHTML = `<p class="error-msg">Erro ao carregar edicoes/index.json: ${e.message}</p>`;
    return;
  }

  buildEditionSelector();

  // seleciona primeira edição com pelo menos um livro
  const firstEdition = state.editions.find(e => e.livros && e.livros.length > 0);
  if (!firstEdition) {
    document.getElementById('content').innerHTML = `<p class="error-msg">Nenhum livro disponível ainda. Adicione entradas em edicoes/index.json.</p>`;
    return;
  }

  state.currentEditionId = firstEdition.id;
  document.getElementById('sel-edition').value = firstEdition.id;
  document.getElementById('topbar-edition-label').textContent = firstEdition.edicao;

  await loadBook(firstEdition.id, firstEdition.livros[0]);
}

// ══════════════════════════════════════════════════════════════
//  SELETOR DE EDIÇÃO
// ══════════════════════════════════════════════════════════════

function buildEditionSelector() {
  const sel = document.getElementById('sel-edition');
  sel.innerHTML = '';
  state.editions.forEach(ed => {
    const opt = document.createElement('option');
    opt.value = ed.id;
    opt.textContent = ed.edicao;
    if (ed.livros.length === 0) opt.disabled = true;
    sel.appendChild(opt);
  });
}

function onEditionChange(editionId) {
  const ed = state.editions.find(e => e.id === editionId);
  if (!ed || !ed.livros.length) return;
  state.currentEditionId = editionId;
  document.getElementById('topbar-edition-label').textContent = ed.edicao;

  // tenta manter o mesmo livro se disponível na nova edição
  const sameBook = ed.livros.find(f => f.includes(state.currentBookId));
  const bookFile = sameBook || ed.livros[0];
  loadBook(editionId, bookFile);
}

// ══════════════════════════════════════════════════════════════
//  CARREGAMENTO DE LIVRO (dois níveis: index.json + N.json)
// ══════════════════════════════════════════════════════════════

/**
 * Carrega o index.json de um livro.
 * bookFile ex: "edicoes/figueiredo/proverbios/index.json"
 * Retorna { id, titulo, capitulos: [1,2,3,...], ... }
 */
async function fetchBookIndex(editionId, bookFile) {
  const cacheKey = editionId + '/' + bookFile;
  if (state.loadedBookIndexes[cacheKey]) return state.loadedBookIndexes[cacheKey];
  const res = await fetch(bookFile);
  if (!res.ok) throw new Error(`HTTP ${res.status} ao carregar ${bookFile}`);
  const data = await res.json();
  state.loadedBookIndexes[cacheKey] = data;
  return data;
}

/**
 * Carrega um capítulo individual.
 * bookDir ex: "edicoes/figueiredo/proverbios"
 * num ex: 8
 * Retorna { num, sumario, versiculos, notas }
 */
async function fetchChapter(bookDir, num) {
  const cacheKey = bookDir + '/' + num;
  if (state.loadedChapters[cacheKey]) return state.loadedChapters[cacheKey];
  const url = bookDir + '/' + num + '.json';
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} ao carregar ${url}`);
  const data = await res.json();
  state.loadedChapters[cacheKey] = data;
  return data;
}

/** Extrai o diretório de um bookFile. Ex: "edicoes/figueiredo/proverbios/index.json" → "edicoes/figueiredo/proverbios" */
function bookDirFromFile(bookFile) {
  return bookFile.substring(0, bookFile.lastIndexOf('/'));
}

async function loadBook(editionId, bookFile, chapter = 1) {
  document.getElementById('content').innerHTML = '<p class="loading-msg">Carregando…</p>';
  try {
    const bookIndex = await fetchBookIndex(editionId, bookFile);
    const bookDir = bookDirFromFile(bookFile);

    state.currentBookId = bookIndex.id;
    state.currentBookDir = bookDir;
    state.currentChapter = chapter;
    state.currentBookIntroducao = bookIndex.introducao || null;

    const chNum = chapter;
    const chData = await fetchChapter(bookDir, chNum);

    renderChapter(chData, bookDir, 'content');
    updateNav(bookIndex);
    document.getElementById('nav-book-title').textContent = bookIndex.titulo;
    document.getElementById('bot-book-title').textContent = bookIndex.titulo;
    buildBookSelector();

    if (state.compareMode && state.compareEditionId) {
      await loadCompareChapter();
    }
  } catch (e) {
    document.getElementById('content').innerHTML = `<p class="error-msg">Erro ao carregar livro: ${e.message}</p>`;
  }
}

// ══════════════════════════════════════════════════════════════
//  RENDERIZAÇÃO
// ══════════════════════════════════════════════════════════════

function renderChapter(ch, bookDir, targetId) {
  if (!ch) {
    document.getElementById(targetId).innerHTML = '<p class="error-msg">Capítulo não encontrado.</p>';
    return;
  }

  // monta índice de notas
  const notaKeys = ch.notas ? Object.keys(ch.notas) : [];

  const verses = ch.versiculos.filter(i => i.tipo !== 'bio');
  const bios   = ch.versiculos.filter(i => i.tipo === 'bio');
  const ordered = [...verses, ...bios];

  const lines = ordered.map(item => {
    if (item.tipo === 'bio') {
      return `<div class="bio"><div class="bio-title">${item.titulo}</div><p>${item.texto}</p></div>`;
    }
    let fnHtml = '';
    if (item.nota && ch.notas && ch.notas[item.nota]) {
      const nota = ch.notas[item.nota];
      const fnNum = notaKeys.indexOf(item.nota) + 1;
      const popupId = `popup_${targetId}_${item.nota}`;
      fnHtml = `<sup class="fnref" onclick="togglePopup(event,'${popupId}')">[${fnNum}]<span class="fn-popup" id="${popupId}"><button class="fn-close" onclick="closePopup(event)">✕</button><span class="fn-label">${nota.rotulo}</span> — <span>${nota.texto}</span></span></sup>`;
    }
    return `<p class="verse" data-v="${item.n}"><span class="vnum"><a name="v${item.n}">${item.n}</a></span>${item.texto}${fnHtml}</p>`;
  }).join('\n');

  const pdfUrl = bookDir + '/' + ch.num + '.pdf';
  const pdfBtn = `<button class="ver-original-btn" onclick="openPdfPanel('${pdfUrl}')">&#128196; Ver original</button>`;
  const introBtn = state.currentBookIntroducao
    ? `<button class="ver-original-btn" onclick="openIntro()" style="margin-left:12px;">&#128214; Introdução</button>`
    : '';

  document.getElementById(targetId).innerHTML = `
    <div class="chapter-header">
      <h1>Capítulo ${ch.num}</h1>
      <div class="summary">${ch.sumario}</div>
      ${pdfBtn}${introBtn}
    </div>
    <hr class="section-rule">
    ${lines}
  `;
}

function renderVerseHtml(item, notas, notaKeys, prefix) {
  if (item.tipo === 'bio') {
    return `<div class="bio"><div class="bio-title">${item.titulo}</div><p>${item.texto}</p></div>`;
  }
  let fnHtml = '';
  if (item.nota && notas && notas[item.nota]) {
    const nota = notas[item.nota];
    const fnNum = notaKeys.indexOf(item.nota) + 1;
    const popupId = `popup_${prefix}_${item.nota}`;
    fnHtml = `<sup class="fnref" onclick="togglePopup(event,'${popupId}')">[${fnNum}]<span class="fn-popup" id="${popupId}"><button class="fn-close" onclick="closePopup(event)">✕</button><span class="fn-label">${nota.rotulo}</span> — <span>${nota.texto}</span></span></sup>`;
  }
  return `<span class="vnum"><a name="v${item.n}_${prefix}">${item.n}</a></span>${item.texto}${fnHtml}`;
}

function renderCompareGrid(ch1, ch2, bookDir1, bookDir2) {
  const grid = document.getElementById('compare-grid');
  grid.innerHTML = '';

  if (!ch1) {
    grid.innerHTML = '<p class="error-msg" style="grid-column:1/-1">Capítulo não encontrado.</p>';
    return;
  }

  const ed1 = state.editions.find(e => e.id === state.currentEditionId);
  const ed2 = ch2 ? state.editions.find(e => e.id === state.compareEditionId) : null;

  // Cabeçalhos das edições
  const makeHeaderCell = (ed, ch, bookDir) => {
    const div = document.createElement('div');
    div.className = 'cg-cell cg-header-cell';
    const pdfUrl = bookDir + '/' + ch.num + '.pdf';
    const pdfBtn = `<button class="ver-original-btn" onclick="openPdfPanel('${pdfUrl}')">&#128196; Ver original</button>`;
    div.innerHTML = `<div class="cg-edition-label">${ed ? ed.edicao : ''}</div>`
      + `<div class="cg-chapter-title">Capítulo ${ch.num}</div>`
      + `<div class="cg-summary-text">${ch.sumario}</div>`
      + pdfBtn;
    return div;
  };

  grid.appendChild(makeHeaderCell(ed1, ch1, bookDir1));
  if (ch2) {
    grid.appendChild(makeHeaderCell(ed2, ch2, bookDir2));
  } else {
    grid.appendChild(document.createElement('div'));
  }

  // Linha separadora entre cabeçalho e versículos
  const rule = document.createElement('div');
  rule.className = 'cg-rule';
  grid.appendChild(rule);

  // Pares de versículos
  const verses1 = ch1.versiculos.filter(i => i.tipo !== 'bio');
  const bios1   = ch1.versiculos.filter(i => i.tipo === 'bio');
  const verses2 = ch2 ? ch2.versiculos.filter(i => i.tipo !== 'bio') : [];
  const bios2   = ch2 ? ch2.versiculos.filter(i => i.tipo === 'bio') : [];
  const notaKeys1 = ch1.notas ? Object.keys(ch1.notas) : [];
  const notaKeys2 = ch2 && ch2.notas ? Object.keys(ch2.notas) : [];
  const maxLen = Math.max(verses1.length, verses2.length);
  const maxBios = Math.max(bios1.length, bios2.length);

  for (let i = 0; i < maxLen; i++) {
    const item1 = verses1[i];
    const item2 = verses2[i];

    const cell1 = document.createElement('div');
    cell1.className = 'cg-cell';
    if (item1) cell1.innerHTML = renderVerseHtml(item1, ch1.notas || {}, notaKeys1, 'cg1');
    grid.appendChild(cell1);

    const cell2 = document.createElement('div');
    cell2.className = 'cg-cell';
    if (item2) cell2.innerHTML = renderVerseHtml(item2, (ch2 && ch2.notas) || {}, notaKeys2, 'cg2');
    grid.appendChild(cell2);

    const divider = document.createElement('div');
    divider.className = 'cg-divider';
    grid.appendChild(divider);
  }

  // bios sempre por último
  for (let i = 0; i < maxBios; i++) {
    const b1 = bios1[i];
    const b2 = bios2[i];

    const bcell1 = document.createElement('div');
    bcell1.className = 'cg-cell';
    if (b1) bcell1.innerHTML = `<div class="bio"><div class="bio-title">${b1.titulo}</div><p>${b1.texto}</p></div>`;
    grid.appendChild(bcell1);

    const bcell2 = document.createElement('div');
    bcell2.className = 'cg-cell';
    if (b2) bcell2.innerHTML = `<div class="bio"><div class="bio-title">${b2.titulo}</div><p>${b2.texto}</p></div>`;
    grid.appendChild(bcell2);

    const bdivider = document.createElement('div');
    bdivider.className = 'cg-divider';
    grid.appendChild(bdivider);
  }
}

// ══════════════════════════════════════════════════════════════
//  NAVEGAÇÃO
// ══════════════════════════════════════════════════════════════

function updateNav(bookIndex) {
  const caps = bookIndex.capitulos; // array de números: [1, 2, 3, ...]
  const ch = state.currentChapter;
  const firstCap = caps[0];
  const lastCap = caps[caps.length - 1];

  document.getElementById('nav-ch-num').textContent = ch;

  // prev
  const prevEl = document.getElementById('nav-prev-ch');
  const botPrev = document.getElementById('bot-prev');
  const prevCap = caps[caps.indexOf(ch) - 1];
  if (prevCap !== undefined) {
    prevEl.outerHTML = `<a href="#" id="nav-prev-ch" onclick="goChapter(${prevCap}); return false;">&lt; cap. ant.</a>`;
    botPrev.outerHTML = `<a href="#" id="bot-prev" onclick="goChapter(${prevCap}); return false;">&lt; cap. ant.</a>`;
  } else {
    prevEl.outerHTML = `<span class="dimmed" id="nav-prev-ch">&lt; cap. ant.</span>`;
    botPrev.outerHTML = `<span class="dimmed" id="bot-prev">&lt; cap. ant.</span>`;
  }

  // next
  const nextEl = document.getElementById('nav-next-ch');
  const botNext = document.getElementById('bot-next');
  const nextCap = caps[caps.indexOf(ch) + 1];
  if (nextCap !== undefined) {
    nextEl.outerHTML = `<a href="#" id="nav-next-ch" onclick="goChapter(${nextCap}); return false;">próx. cap. &gt;</a>`;
    botNext.outerHTML = `<a href="#" id="bot-next" onclick="goChapter(${nextCap}); return false;">próx. cap. &gt;</a>`;
  } else {
    nextEl.outerHTML = `<span class="dimmed" id="nav-next-ch">próx. cap. &gt;</span>`;
    botNext.outerHTML = `<span class="dimmed" id="bot-next">próx. cap. &gt;</span>`;
  }

  // chapter links
  let links = '<span class="label">Capítulos:</span> ';
  caps.forEach(n => {
    if (n === ch) links += `<a class="current" href="#">${n}</a> `;
    else links += `<a href="#" onclick="goChapter(${n}); return false;">${n}</a> `;
  });
  document.getElementById('chapter-links').innerHTML = links;
}

function goChapter(n) {
  if (activePopup) { activePopup.classList.remove('active'); activePopup = null; }
  const ed = state.editions.find(e => e.id === state.currentEditionId);
  const bookFile = ed.livros.find(f => f.includes('/' + state.currentBookId + '/'));
  loadBook(state.currentEditionId, bookFile, n);
  window.scrollTo(0, 0);
}

async function prevBook() {
  const ed = state.editions.find(e => e.id === state.currentEditionId);
  const idx = ed.livros.findIndex(f => f.includes('/' + state.currentBookId + '/'));
  if (idx <= 0) return;
  await loadBook(state.currentEditionId, ed.livros[idx - 1], 1);
}

async function nextBook() {
  const ed = state.editions.find(e => e.id === state.currentEditionId);
  const idx = ed.livros.findIndex(f => f.includes('/' + state.currentBookId + '/'));
  if (idx < 0 || idx >= ed.livros.length - 1) return;
  await loadBook(state.currentEditionId, ed.livros[idx + 1], 1);
}

// ══════════════════════════════════════════════════════════════
//  MODO COMPARAÇÃO
// ══════════════════════════════════════════════════════════════

function toggleCompare() {
  state.compareMode = !state.compareMode;
  const area = document.getElementById('main-area');

  if (state.compareMode) {
    area.classList.replace('single', 'compare');
    // auto-seleciona a outra edição disponível
    const other = state.editions.find(e => e.id !== state.currentEditionId && e.livros.length > 0);
    if (other) {
      state.compareEditionId = other.id;
      loadCompareChapter();
    }
  } else {
    area.classList.replace('compare', 'single');
    state.compareEditionId = null;
    document.getElementById('compare-grid').innerHTML = '';
    document.getElementById('content-compare').innerHTML = '';
  }
}

function buildCompareEditionSelector() {
  const sel = document.getElementById('sel-compare-edition');
  sel.innerHTML = '<option value="">— selecionar edição —</option>';
  state.editions.forEach(ed => {
    if (ed.id === state.currentEditionId) return; // não comparar consigo mesmo
    const opt = document.createElement('option');
    opt.value = ed.id;
    opt.textContent = ed.edicao;
    if (ed.livros.length === 0) opt.disabled = true;
    sel.appendChild(opt);
  });
}

function onCompareEditionChange(editionId) {
  if (!editionId) return;
  state.compareEditionId = editionId;
  loadCompareChapter();
}

async function loadCompareChapter() {
  if (!state.compareEditionId) return;
  const ed = state.editions.find(e => e.id === state.compareEditionId);
  const grid = document.getElementById('compare-grid');
  document.getElementById('compare-status').textContent = '';

  if (!ed || !ed.livros.length) {
    grid.innerHTML = '<p class="error-msg" style="grid-column:1/-1">Esta edição ainda não possui livros disponíveis.</p>';
    return;
  }

  const bookFile2 = ed.livros.find(f => f.includes('/' + state.currentBookId + '/'));
  if (!bookFile2) {
    grid.innerHTML = '<p class="error-msg" style="grid-column:1/-1">O livro atual ainda não está disponível nesta edição.</p>';
    document.getElementById('compare-status').textContent = 'livro não disponível nesta edição';
    return;
  }

  grid.innerHTML = '<p class="loading-msg" style="grid-column:1/-1">Carregando…</p>';

  try {
    const bookDir2 = bookDirFromFile(bookFile2);
    const ch2 = await fetchChapter(bookDir2, state.currentChapter);
    const ch1 = state.loadedChapters[state.currentBookDir + '/' + state.currentChapter];
    renderCompareGrid(ch1, ch2, state.currentBookDir, bookDir2);
  } catch (e) {
    grid.innerHTML = `<p class="error-msg" style="grid-column:1/-1">Erro: ${e.message}</p>`;
  }
}

// ══════════════════════════════════════════════════════════════
//  SELETOR DE LIVROS (OVERLAY)
// ══════════════════════════════════════════════════════════════

function buildBookSelector() {
  const ed = state.editions.find(e => e.id === state.currentEditionId);
  if (!ed) return;

  // Mapa de dois níveis: testamento → grupo → [{file, book}]
  const testamentoMap = new Map();
  const unloaded = [];

  ed.livros.forEach(file => {
    const cacheKey = ed.id + '/' + file;
    const bookIdx = state.loadedBookIndexes[cacheKey];
    if (!bookIdx) { unloaded.push(file); return; }
    const testamento = bookIdx.testamento || 'Outros';
    const grupo = bookIdx.grupo || 'Outros';
    if (!testamentoMap.has(testamento)) testamentoMap.set(testamento, new Map());
    const grupoMap = testamentoMap.get(testamento);
    if (!grupoMap.has(grupo)) grupoMap.set(grupo, []);
    grupoMap.get(grupo).push({ file, book: bookIdx });
  });

  // Ordem canônica dos testamentos
  const TESTAMENTO_ORDER = ['Antigo Testamento', 'Novo Testamento'];
  const sortedTestamentos = [...testamentoMap.entries()].sort(([a], [b]) => {
    const ia = TESTAMENTO_ORDER.indexOf(a), ib = TESTAMENTO_ORDER.indexOf(b);
    return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib) || a.localeCompare(b, 'pt');
  });

  let html = '';

  for (const [testamento, grupoMap] of sortedTestamentos) {
    html += `<div class="testament-section"><div class="testament-title">${testamento}</div>`;
    for (const [grupo, items] of grupoMap.entries()) {
      html += `<div class="book-group"><div class="group-label">${grupo}</div>`;
      items.forEach(({ file, book }) => {
        const cls = book.id === state.currentBookId ? ' class="current-book"' : '';
        html += `<a${cls} href="#" onclick="selectBook('${file}'); return false;">${book.titulo}</a>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  }

  if (unloaded.length > 0) {
    html += `<div class="testament-section"><div class="book-group"><div class="group-label">Carregando…</div>`;
    unloaded.forEach(file => {
      const label = file.split('/').slice(-2, -1)[0] || file.split('/').pop().replace('.json', '');
      html += `<a href="#" onclick="selectBook('${file}'); return false;">${label}</a>`;
    });
    html += `</div></div>`;
  }

  if (!html) html = '<p style="color:#888;font-size:13px;">Nenhum livro disponível ainda.</p>';
  document.getElementById('book-list-content').innerHTML = html;
}

async function selectBook(file) {
  closeBooks();
  await loadBook(state.currentEditionId, file, 1);
}

async function openBooks() {
  document.getElementById('book-selector').classList.add('open');
  buildBookSelector();

  // carrega metadados de todos os livros da edição em paralelo
  const ed = state.editions.find(e => e.id === state.currentEditionId);
  if (!ed) return;
  const pending = ed.livros.filter(f => !state.loadedBookIndexes[ed.id + '/' + f]);
  if (pending.length > 0) {
    await Promise.all(pending.map(f => fetchBookIndex(ed.id, f).catch(() => null)));
    buildBookSelector(); // re-renderiza com dados completos
  }
}
function closeBooks() { document.getElementById('book-selector').classList.remove('open'); }
function closeBooksOverlay(e) {
  if (e.target === document.getElementById('book-selector')) closeBooks();
}

// ══════════════════════════════════════════════════════════════
//  POPUPS DE NOTAS
// ══════════════════════════════════════════════════════════════

function togglePopup(e, popupId) {
  e.stopPropagation();
  const popup = document.getElementById(popupId);
  if (!popup) return;
  if (activePopup && activePopup !== popup) activePopup.classList.remove('active');
  popup.classList.toggle('active');
  activePopup = popup.classList.contains('active') ? popup : null;
}

function closePopup(e) {
  e.stopPropagation();
  if (activePopup) { activePopup.classList.remove('active'); activePopup = null; }
}

document.addEventListener('click', () => {
  if (activePopup) { activePopup.classList.remove('active'); activePopup = null; }
});

// ══════════════════════════════════════════════════════════════
//  DRAWER PDF ORIGINAL
// ══════════════════════════════════════════════════════════════

function openPdfPanel(url) {
  const frame = document.getElementById('pdf-frame');
  const panel = document.getElementById('pdf-panel');
  frame.src = url;
  panel.classList.add('open');
}

function closePdfPanel() {
  const panel = document.getElementById('pdf-panel');
  panel.classList.remove('open');
  // limpa o src para interromper carregamento se ainda em progresso
  setTimeout(() => { document.getElementById('pdf-frame').src = ''; }, 300);
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closePdfPanel(); closeIntro(); }
});

// ══════════════════════════════════════════════════════════════
//  MODAL DE INTRODUÇÃO
// ══════════════════════════════════════════════════════════════

function openIntro() {
  document.getElementById('intro-content').innerHTML =
    state.currentBookIntroducao || '<p>Introdução não disponível.</p>';
  document.getElementById('intro-modal').classList.add('open');
}

function closeIntro() {
  document.getElementById('intro-modal').classList.remove('open');
}

function closeIntroOverlay(e) {
  if (e.target === document.getElementById('intro-modal')) closeIntro();
}
